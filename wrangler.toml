name = "pongo"
main = "worker/index.js"
compatibility_date = "2024-01-01"

[build]
# Full build (server + client wasm + static assets), matching `npm run build`, so a
# standalone `wrangler deploy` produces a complete worker/pkg, not just the server half.
command = "npm run build"

[assets]
directory = "./worker/pkg"
binding = "ASSETS"
html_handling = "auto-trailing-slash"

[durable_objects]
bindings = [{ name = "MATCH", class_name = "MatchDO" }]

[[migrations]]
tag = "v1"
new_classes = ["MatchDO"]
