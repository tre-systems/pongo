name = "pongo"
main = "worker/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_als"]

# Capture Workers logs/metrics so intermittent edge timeouts are diagnosable.
# Traffic is only a few hundred requests/day, so sample everything.
[observability]
enabled = true
head_sampling_rate = 1

[vars]
SENTRY_ENVIRONMENT = "production"
SENTRY_PROJECT = "pongo"

[build]
# Mirror `npm run build` so a standalone `wrangler deploy` produces a complete worker/pkg.
command = "npm run build"

[assets]
directory = "./worker/pkg"
binding = "ASSETS"
html_handling = "auto-trailing-slash"
not_found_handling = "404-page"

[durable_objects]
bindings = [{ name = "MATCH", class_name = "MatchDO" }]

[[migrations]]
tag = "v1"
new_classes = ["MatchDO"]
